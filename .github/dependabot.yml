version: 2

updates:
  # Frontend — npm/bun ecosystem
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-*", "@types/react*"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint", "@typescript-eslint/*"]
      vite:
        patterns: ["vite*", "@vitejs/*"]
    ignore:
      # TypeScript 7 (the Go-native port) is blocked on typescript-eslint, which
      # declares peer `typescript: ">=4.8.4 <6.1.0"` as of 8.64.0. Remove this
      # entry once a stable typescript-eslint widens that range; until then the
      # bump only produces PRs that fail `bun run lint`.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
