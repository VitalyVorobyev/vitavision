name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + build ────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          # Set in GitHub repo secrets → points to Hetzner backend in production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  # ── Backend: install deps + run tests ────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v
        env:
          STORAGE_MODE: local
          LOCAL_STORAGE_ROOT: /tmp/vitavision-test-storage

  # ── Backend: lint + type-check ────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: pip install ruff mypy types-Pillow

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: Mypy type check
        working-directory: backend
        run: mypy . --ignore-missing-imports

  # ── Build backend Docker image and push to GHCR (main only) ──────────────
  build-backend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # push Docker image to GHCR
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vitavision-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── Deploy backend to Hetzner via SSH (after image is pushed) ────────────
  deploy-hetzner:
    needs: build-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          # Pin to the exact digest produced by this CI run — immune to tag overwrites.
          IMAGE: ghcr.io/${{ github.repository_owner }}/vitavision-backend@${{ needs.build-backend.outputs.image_digest }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE
          script: |
            docker pull $IMAGE
            docker tag $IMAGE ghcr.io/${{ github.repository_owner }}/vitavision-backend:latest
            cd /opt/demos
            docker compose up -d --remove-orphans
            docker image prune -f
