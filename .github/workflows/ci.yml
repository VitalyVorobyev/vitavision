name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # push Docker image to GHCR

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: lint + build ────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          # Set in GitHub repo secrets → points to Hetzner backend in production
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

  # ── Build backend Docker image and push to GHCR (main only) ──────────────
  build-backend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vitavision-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── Deploy backend to Hetzner via SSH (after image is pushed) ────────────
  deploy-hetzner:
    needs: build-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/vitavision-backend:latest
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE
          script: |
            docker pull $IMAGE
            docker stop vitavision-backend || true
            docker rm vitavision-backend || true
            docker run -d \
              --name vitavision-backend \
              --env-file ~/vitavision/.env \
              -p 8000:8000 \
              --restart unless-stopped \
              $IMAGE
