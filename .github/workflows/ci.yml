name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Content: validate frontmatter, images, links ─────────────────────────
  validate-content:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install
        run: bun install --frozen-lockfile

      # NOTE: `content:validate` and `scripts/validate-content.ts` are two
      # different scripts with different coverage — the similar names are a
      # known trap (see .claude/CLAUDE.md → "Validation"). `content:validate`
      # (scripts/content-validate.ts) checks blog/algorithm markdown links and
      # `relatedPosts`. `scripts/validate-content.ts` is the real Atlas graph
      # validator — slug resolution (including `relations[].target`),
      # prerequisite cycles, source-id existence, canonical-quality gates.
      # Run by explicit path so the distinction stays unmissable in the log.
      - name: Validate content (blog/demo links)
        run: bun run content:validate

      - name: Validate content (Atlas graph)
        run: bun run scripts/validate-content.ts

  # ── Frontend: lint + build ────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Guards the components synced to claude.ai/design against reaching the
      # editor store, the WASM proxy, konva, or Clerk. Those break a design
      # render SILENTLY — the preview card comes up blank with no error in any
      # log — so nothing else in CI would catch it. Deliberately runs BEFORE the
      # build: it needs no build artifacts (see the `external` note in the
      # script) and takes ~1s, so it fails fast.
      - name: Validate design-system boundary
        run: bun run ds:validate

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test

      - name: WASM schema tests
        run: bun run scripts/test-wasm-schemas.ts
