name: Dependabot lockfile

# Dependabot edits package.json but does not reliably regenerate bun.lock, so its
# PRs fail CI at `bun install --frozen-lockfile`. This workflow regenerates the
# lockfile on the Dependabot branch and pushes it back, making those PRs mergeable
# on their own.
#
# Note: pushing to the branch makes Dependabot treat the PR as modified by someone
# else, so it stops auto-rebasing it. That is an accepted trade-off.

on:
  push:
    branches: ['dependabot/**']

permissions:
  contents: write

concurrency:
  group: dependabot-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      # Deliberately not --frozen-lockfile: regenerating the lockfile is the point.
      - name: Regenerate bun.lock
        run: bun install

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already in sync — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): regenerate bun.lock"
          # Pushes made with GITHUB_TOKEN do not retrigger workflows, so this
          # cannot loop; CI runs from the resulting pull_request event.
          git push origin HEAD:"${GITHUB_REF_NAME}"
