<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="566.82pt" height="263.712063pt" viewBox="0 0 566.82 263.712063" xmlns="http://www.w3.org/2000/svg" version="1.1" role="img" aria-labelledby="title desc"><title id="title">CCDN checkerboard corner detection network pipeline</title><desc id="desc">11-stage pipeline from grayscale input through six convolutional layers with two stride-1 max-pools, producing a full-resolution response map that is post-processed by adaptive threshold, 4×4 NMS, and k-means++ cluster pruning to the final corner set.</desc>
