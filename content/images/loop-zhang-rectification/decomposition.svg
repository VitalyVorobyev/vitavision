<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 330" class="h-auto w-full text-foreground" style="color:#64748b" width="1160" height="330" role="img" aria-label="Four-panel schematic of the Loop-Zhang homography decomposition applied to one image. Panel 1: the original rectangular image with the epipole e outside the frame and four epipolar lines converging toward it. Panel 2: after the projective component H_p sends the epipole to infinity, the rectangle becomes a trapezoid and the four epipolar lines are now parallel to each other but still tilted, not yet horizontal. Panel 3: after the similarity component H_r, the same trapezoid is rigidly rotated so the epipolar lines become exactly horizontal, aligned with scanlines; the quadrilateral itself now appears tilted in the frame. Panel 4: after the shearing component H_s, the quadrilateral is partially squared up toward a rectangle while the lines stay horizontal, but a visible residual skew remains because the affine shear cannot fully undo the earlier projective distortion.">
  <defs>
    <marker id="lz-arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="lz-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="lz-arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- ============ Panel 1: original image, epipole outside the frame ============ -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <rect x="27" y="90" width="140" height="180"/>
  </g>
  <g stroke="#0f766e" stroke-width="1.6" fill="none">
    <line x1="92"  y1="90"     x2="27" y2="110"/>
    <line x1="144" y1="90"     x2="27" y2="150"/>
    <line x1="167" y1="92.31"  x2="27" y2="200"/>
    <line x1="167" y1="109.24" x2="27" y2="260"/>
  </g>
  <g stroke="#0f766e" stroke-width="1.3" stroke-dasharray="4 3" fill="none">
    <line x1="92"  y1="90"     x2="222" y2="50"/>
    <line x1="144" y1="90"     x2="222" y2="50"/>
    <line x1="167" y1="92.31"  x2="222" y2="50"/>
    <line x1="167" y1="109.24" x2="222" y2="50"/>
  </g>
  <circle cx="222" cy="50" r="4" fill="#0f766e"/>
  <text x="222" y="38" text-anchor="middle" font-family="Geist Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#0f766e">e</text>

  <!-- ============ Panel 2: after H_p — epipole sent to infinity (trapezoid) ============ -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M 332 110 L 487 65 L 487 295 L 332 250 Z"/>
  </g>
  <g stroke="#0f766e" stroke-width="1.6" fill="none">
    <line x1="332" y1="104.2" x2="487" y2="145.8"/>
    <line x1="332" y1="154.2" x2="487" y2="195.8"/>
    <line x1="332" y1="204.2" x2="487" y2="245.8"/>
    <line x1="332" y1="254.2" x2="487" y2="295.8"/>
  </g>

  <!-- ============ Panel 3: after H_r — rigid rotation aligns lines to horizontal ============ -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M 606.5 132.4 L 744.6 48.9 L 804.1 271.0 L 642.8 267.7 Z"/>
  </g>
  <g stroke="#0f766e" stroke-width="1.6" fill="none">
    <line x1="605.0"  y1="126.84" x2="765.5"  y2="126.91"/>
    <line x1="618.0"  y1="175.1"  x2="778.4"  y2="175.2"/>
    <line x1="630.9"  y1="223.4"  x2="791.4"  y2="223.5"/>
    <line x1="643.84" y1="271.7"  x2="804.3"  y2="271.8"/>
  </g>

  <!-- ============ Panel 4: after H_s — shear partially squares the quadrilateral ============ -->
  <g fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M 903.64 132.4 L 1054.27 48.9 L 1080.45 271.0 L 919.65 267.7 Z"/>
  </g>
  <g stroke="#0f766e" stroke-width="1.6" fill="none">
    <line x1="902.97" y1="126.85" x2="1063.47" y2="126.85"/>
    <line x1="908.73" y1="175.15" x2="1069.13" y2="175.15"/>
    <line x1="914.38" y1="223.45" x2="1074.88" y2="223.45"/>
    <line x1="920.04" y1="271.75" x2="1080.54" y2="271.75"/>
  </g>

  <!-- ============ transform arrows ============ -->
  <g stroke-width="2" fill="none">
    <line x1="262" y1="170" x2="317" y2="170" stroke="#b45309" marker-end="url(#lz-arrow-amber)"/>
    <line x1="552" y1="170" x2="607" y2="170" stroke="#1d4ed8" marker-end="url(#lz-arrow-blue)"/>
    <line x1="842" y1="170" x2="897" y2="170" stroke="#b91c1c" marker-end="url(#lz-arrow-red)"/>
  </g>
  <g font-family="Geist Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="middle">
    <text x="289.5" y="158" fill="#b45309">H_p</text>
    <text x="579.5" y="158" fill="#1d4ed8">H_r</text>
    <text x="869.5" y="158" fill="#b91c1c">H_s</text>
  </g>

  <!-- ============ panel captions ============ -->
  <g font-family="Geist, Inter, system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#64748b">
    <text x="144.5"  y="312">original (epipole e)</text>
    <text x="434.5"  y="312">H_p: epipole &#8594; infinity</text>
    <text x="724.5"  y="312">H_r: rotated to horizontal</text>
    <text x="1014.5" y="312">H_s: partial shear correction</text>
  </g>
</svg>
