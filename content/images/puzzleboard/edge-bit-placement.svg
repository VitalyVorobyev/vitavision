<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" class="h-auto w-full text-foreground" style="color:#1e293b" width="480" height="320" role="img" aria-label="PuzzleBoard edge-bit placement: a circle of diameter one-third of the edge length at the midpoint of each checkerboard edge, with the middle-third zone highlighted along one shared edge.">
  <g aria-hidden="true">
    <rect x="60" y="60" width="180" height="180" fill="#0f172a"/>
    <rect x="240" y="60" width="180" height="180" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.75"/>
  </g>
  <g>
    <line x1="240" y1="90" x2="240" y2="210" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
    <line x1="240" y1="60" x2="240" y2="240" stroke="#0f172a" stroke-width="1" opacity="0.6"/>
  </g>
  <g stroke="currentColor" stroke-width="1.25" fill="#f8fafc">
    <circle cx="240" cy="150" r="30"/>
  </g>
  <g stroke="currentColor" stroke-width="1.25" fill="#0f172a">
    <circle cx="150" cy="60" r="30"/>
  </g>
  <g stroke="currentColor" stroke-width="1.25" fill="#0f172a">
    <circle cx="330" cy="60" r="30"/>
  </g>
  <g stroke="currentColor" stroke-width="1.25" fill="#f8fafc">
    <circle cx="150" cy="240" r="30"/>
  </g>
  <g stroke="currentColor" stroke-width="1.25" fill="#f8fafc">
    <circle cx="330" cy="240" r="30"/>
  </g>
  <g stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" fill="none" opacity="0.7">
    <line x1="240" y1="120" x2="240" y2="180"/>
  </g>
  <g stroke="#b45309" stroke-width="1.25" fill="none">
    <path d="M 260 150 L 290 150 M 260 150 L 265 145 M 260 150 L 265 155 M 290 150 L 285 145 M 290 150 L 285 155"/>
  </g>
  <g fill="currentColor" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" text-anchor="start">
    <text x="296" y="154" fill="#b45309" font-weight="600">diameter = L/3</text>
  </g>
  <g stroke="currentColor" stroke-width="1" fill="none">
    <line x1="60" y1="272" x2="240" y2="272"/>
    <line x1="60" y1="268" x2="60" y2="276"/>
    <line x1="240" y1="268" x2="240" y2="276"/>
  </g>
  <g fill="currentColor" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" text-anchor="middle">
    <text x="150" y="288">edge length L</text>
  </g>
  <g fill="currentColor" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="start">
    <text x="14" y="20" font-weight="700">Bit circle at the midpoint of each edge</text>
    <text x="14" y="36">Middle-third zone (amber) contains the imaged midpoint</text>
    <text x="14" y="50">under any non-degenerate perspective transform.</text>
  </g>
  <g fill="currentColor" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" text-anchor="middle">
    <text x="150" y="155" fill="#f8fafc">0</text>
    <text x="330" y="155" fill="#0f172a">1</text>
  </g>
</svg>
