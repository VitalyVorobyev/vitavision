<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" class="h-auto w-full text-foreground" style="color:#1e293b" width="600" height="350" role="img" aria-label="Closed-loop diagram of the AX equals XB constraint: four coordinate frames G_i, G_j, C_i, C_j connected by gripper motion H_g_ij (top), camera motion H_c_ij (bottom), and the constant camera-to-gripper transform H_cg (sides).">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- nodes -->
  <g font-family="Geist, Inter, system-ui, sans-serif" font-size="18" text-anchor="middle">
    <circle cx="100" cy="60"  r="22" fill="#fff" stroke="currentColor" stroke-width="1.6"/>
    <text x="100" y="66" fill="currentColor">G_i</text>

    <circle cx="380" cy="60"  r="22" fill="#fff" stroke="currentColor" stroke-width="1.6"/>
    <text x="380" y="66" fill="currentColor">G_j</text>

    <circle cx="100" cy="220" r="22" fill="#fff" stroke="currentColor" stroke-width="1.6"/>
    <text x="100" y="226" fill="currentColor">C_i</text>

    <circle cx="380" cy="220" r="22" fill="#fff" stroke="currentColor" stroke-width="1.6"/>
    <text x="380" y="226" fill="currentColor">C_j</text>
  </g>

  <!-- edges -->
  <g fill="none" stroke-width="1.8">
    <!-- top: H_g_ij  (gripper motion) -->
    <line x1="124" y1="60"  x2="356" y2="60"  stroke="#b45309" marker-end="url(#arrow-amber)"/>
    <!-- bottom: H_c_ij (camera motion) -->
    <line x1="124" y1="220" x2="356" y2="220" stroke="#1d4ed8" marker-end="url(#arrow-blue)"/>
    <!-- left: H_cg at station i -->
    <line x1="100" y1="196" x2="100" y2="84"  stroke="currentColor" marker-end="url(#arrow)"/>
    <!-- right: H_cg at station j -->
    <line x1="380" y1="196" x2="380" y2="84"  stroke="currentColor" marker-end="url(#arrow)"/>
  </g>

  <!-- edge labels -->
  <g font-family="Geist Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" text-anchor="middle">
    <text x="240" y="46"  fill="#b45309">H_g_ij</text>
    <text x="240" y="246" fill="#1d4ed8">H_c_ij</text>
    <text x="76"  y="144" fill="currentColor" text-anchor="end">H_cg</text>
    <text x="404" y="144" fill="currentColor" text-anchor="start">H_cg</text>
  </g>
</svg>
