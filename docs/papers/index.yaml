- id: sinzinger2007-model-based
  title: "A model-based approach to junction detection using radial energy"
  authors: ["E. D. Sinzinger"]
  year: 2008
  venue: Pattern Recognition
  url: https://www.sciencedirect.com/science/article/abs/pii/S0031320307002889
  doi: "10.1016/j.patcog.2007.06.032"
  pdf: sinzinger2007-model-based.pdf
  cites: [harris1988-corner]
  notes: |
    Models an image junction as a superposition of sectors separated
    by centrelines radiating from the junction centre and scores it
    by "radial energy" — the variance of pixel intensities along
    concentric circles around the candidate. Duda & Frese 2018 cite
    this as the canonical sector/centreline corner model, contrasting
    it with the edge/gradient view used by Harris and by Förstner's
    subpixel operator. The Radon-transform-via-box-filters detector
    in Duda 2018 realises the same sector model with integer-rotated
    blurs rather than concentric sampling.

