# docs/papers/index.yaml — registry of authoritative sources for Atlas pages.
#
# Each entry has an `id` (kebab-case `firstauthor<year>-shortname` for papers,
# `repo-<owner>-<repo>` for repos, `doc-<basename>` for docs) and an optional
# `kind: paper | repo | doc` field. When `kind` is absent it defaults to
# `paper` (preserves backward compat with the existing 45 paper entries).
#
# Schema by kind:
#   paper (default):
#     id, title, authors, year, venue, url, pdf
#     optional: arxiv, doi, cites
#   repo:
#     id, kind: repo, repo (https URL), commit (7-40 hex), license (SPDX)
#     optional: title, description, weights_url, weights_license
#   doc:
#     id, kind: doc, path (repo-relative)
#     optional: title, description
#
# Frontmatter `sources.primary` / `sources.references[]` reference these IDs.
# The grammar accepts:
#   <bare-id>          → treated as paper:<bare-id> (backward compat)
#   paper:<id>         → explicit paper kind
#   repo:<url>@<sha>   → repo kind, must match an entry with that commit
#   doc:<path>         → doc kind, file must exist under docs/ or content/
#
# Defensive rule: new paper IDs MUST NOT start with `repo:` or `doc:`.
#
# Id convention for papers: firstauthorYEAR-keyword (lowercase, hyphenated).
# Stable across paper versions; greppable. Same author + year disambiguated
# with an `a`/`b` suffix.
#
# PDFs live in papers/.cache/ (gitignored), downloaded by `bun papers:fetch`.
# The `cites` field carries the citation graph; query with `bun papers:query`.

