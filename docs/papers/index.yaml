- id: shiu1989-calibration
  title: "Calibration of wrist-mounted robotic sensors by solving homogeneous transform equations of the form AX=XB"
  authors: ["Y. C. Shiu", "S. Ahmad"]
  year: 1989
  venue: IEEE Transactions on Robotics and Automation
  url: https://doi.org/10.1109/70.88014
  doi: "10.1109/70.88014"
  pdf: shiu1989-calibration.pdf
  cites: []
  notes: |
    Defining formulation of the hand-eye problem as the homogeneous
    matrix equation AX = XB, where A and B are pairs of relative motions
    of the robot hand and the wrist-mounted sensor, and X is the
    constant rigid transform between them. Decomposes the equation
    into a rotation part and a translation part; shows that one motion
    pair is insufficient (the axes of A and B alone leave a 1-parameter
    family of solutions), and that two motion pairs with non-parallel
    rotation axes determine X uniquely. Closed-form linear solution per
    motion pair plus least-squares combination across pairs. Tsai and
    Lenz (1989) cite this as the prior baseline and replace its
    angle-axis-with-extra-unknowns parametrisation with a modified
    Rodrigues vector that keeps the unknown count fixed at six.

