# Authoritative source registry for the algorithms register.
#
# Each entry is a paper. Pages in content/algorithms/*.md reference papers
# by `id` in their `sources:` frontmatter block. The `cites` field carries
# the citation graph; query it with `bun papers:query <relation> <id>`.
#
# Id convention: firstauthorYEAR-keyword (lowercase, hyphenated). Stable
# across paper versions; greppable. Same author + year disambiguated with
# an `a`/`b` suffix.
#
# PDFs live in papers/.cache/ (gitignored), downloaded by `bun papers:fetch`.

- id: bennett2013-chess
  title: "ChESS — Quick and Robust Detection of Chess-board Features"
  authors: ["S. Bennett", "J. Lasenby"]
  year: 2013
  venue: arXiv
  url: https://arxiv.org/pdf/1301.5491v1
  arxiv: "1301.5491"
  pdf: bennett2013-chess.pdf
  cites: [rosten2006-fast]
  notes: |
    Equations (1)-(4) define SR, DR, MR, R. Section §4 details the
    detection algorithm; §4.1 the DFT interpretation; §4.2 the orientation
    binning over the signed measure M_n.

- id: rosten2006-fast
  title: "Machine Learning for High-Speed Corner Detection"
  authors: ["E. Rosten", "T. Drummond"]
  year: 2006
  venue: ECCV
  url: https://www.edwardrosten.com/work/rosten_2006_machine.pdf
  pdf: rosten2006-fast.pdf
  cites: []
  notes: |
    Origin of the FAST-N corner detector and the 16-pixel ring sampling
    pattern that ChESS reuses (RING5 = the FAST-16 pattern scaled to r=5).
    Defines the segment-test criterion, the high-speed cardinal-point
    rejection, and the decision-tree learner.

- id: harris1988-corner
  title: "A Combined Corner and Edge Detector"
  authors: ["C. Harris", "M. J. Stephens"]
  year: 1988
  venue: Alvey Vision Conference
  url: https://bmva-archive.org.uk/bmvc/1988/avc-88-023.pdf
  doi: "10.5244/c.2.23"
  pdf: harris1988-corner.pdf
  cites: []
  notes: |
    Defines the structure-tensor M from Ix, Iy gradients summed over
    a window, and the response R = det(M) - k*tr(M)^2 with k ≈ 0.04–0.06.

- id: shi-tomasi1994-features
  title: "Good Features to Track"
  authors: ["J. Shi", "C. Tomasi"]
  year: 1994
  venue: IEEE CVPR
  url: https://www.ces.clemson.edu/~stb/klt/shi-tomasi-good-features-cvpr1994.pdf
  doi: "10.1109/cvpr.1994.323794"
  pdf: shi-tomasi1994-features.pdf
  cites: []
  notes: |
    Reuses Harris's structure tensor but replaces the Harris response
    with R = min(λ₁, λ₂), the smaller eigenvalue. Corners are points
    where R exceeds a threshold τ; the criterion is derived from a
    feature-tracking quality argument, not corner-strength heuristics.

- id: shu2009-topological
  title: "A topological approach to finding grids in calibration patterns"
  authors: ["C. Shu", "A. Brunton", "M. A. Fiala"]
  year: 2009
  venue: Machine Vision and Applications
  url: https://people.scs.carleton.ca/~c_shu/Publications/find-grids-MVA2010.pdf
  doi: "10.1007/s00138-009-0202-2"
  pdf: shu2009-topological.pdf
  cites: [harris1988-corner]
  notes: |
    Pipeline: (1) Harris corners with subpixel refinement (§2); (2) Delaunay
    triangulation of the corner set, Watson's O(n log n) implementation
    (§2.1); (3) merge each triangle with its single same-colour edge
    neighbour into a quadrilateral (§3); (4) topological filtering — drop
    quads with two nodes of edge-degree > 4 (§4); (5) geometric filtering —
    drop quads whose longer/shorter opposite-edge ratio > 10 (§4); (6)
    flood-fill labelling of integer grid coordinates from an arbitrary seed
    quad (§5). Complexity O(n) in the number of corners; each quad is
    visited once in the flood fill. Three marker circles fix the grid
    origin and x-axis.

- id: stelldinger2024-puzzleboard
  title: "PuzzleBoard: A New Camera Calibration Pattern with Position Encoding"
  authors: ["P. Stelldinger", "N. Schönherr", "J. Biermann"]
  year: 2024
  venue: arXiv
  url: https://arxiv.org/pdf/2409.20127
  arxiv: "2409.20127"
  doi: "10.48550/arxiv.2409.20127"
  pdf: stelldinger2024-puzzleboard.pdf
  cites: [harris1988-corner]
  notes: |
    Calibration pattern: checkerboard overlaid with circular bits encoding a
    sub-perfect map of type (501, 501; 3, 3)_4 — every 3×3 window is unique
    (with triple repetition for error correction). Pipeline: (1) saddle
    detection via Hessian-based response s = f_xy² − f_xx·f_yy − k·(f_xx +
    f_yy)² with default k = 1 (§4.1); (2) subpixel refinement by grayscale
    centroid in a 3×3 neighborhood; (3) grid reconstruction via minimum
    spanning forest on the 9-nearest-neighbour graph using Kruskal's
    algorithm (§4.2); (4) bit read at the middle third of each edge; (5)
    cross-correlation decoding against the two factor maps A, B and their
    180° rotations, yielding position via modulo arithmetic (§4.3). Error
    tolerance: up to 40 % bit errors after majority voting.

- id: laureano2013-topological
  title: "Topological Detection of Chessboard Pattern for Camera Calibration"
  authors: ["G. T. Laureano", "M. S. V. de Paiva", "A. S. da Silva"]
  year: 2013
  venue: IPCV (WorldComp)
  url: https://worldcomp-proceedings.com/proc/p2013/IPC3656.pdf
  pdf: laureano2013-topological.pdf
  cites: [shu2009-topological, rosten2006-fast, bennett2013-chess, harris1988-corner, shi-tomasi1994-features]
  notes: |
    Pipeline: (1) x-corner detector — on a Bresenham circle around each
    pixel p_c with neighbourhood V = {p_1,…,p_n}, count sign alternations
    N_alt of I(p_i) against Tl = m − gate, Th = m + gate, m = mean over V,
    gate = 10; classify p_c as x-corner iff N_alt = 4 and Tl < I(p_c) < Th
    (§2, Eq. 1). (2) NMS by cost max(Σ_dark |I(p_i)−m|, Σ_light |I(p_i)−m|)
    (Eq. 2). (3) Adaptive binarization via Bradley & Roth integral-image
    thresholding. (4) Delaunay triangulation of the x-corner set. (5)
    Topological filter — keep triangles (a) uniform inside after
    binarization, (b) with at least one same-colour edge-neighbour, (c)
    with at most two same-colour neighbours; iterate until fixed point and
    drop orphan vertices (§3). (6) Coordinate propagation — seed (T1, T2)
    of same colour define origin and x/y directions; propagate via
    reflection rule v_v = [v_t^(x), 2·v_t^(y) − v_y^(y)] across shared
    edge (§4). (7) Subpixel refinement via Chen-Zhang Hessian response
    S = I_xx·I_yy − I_xy² applied only at valid vertices; offsets from
    quadratic critical point. Positioned as a specification of Rosten-
    Drummond FAST. Experimental accuracy 85.4 % on the Bouguet database
    (20 images, 156 x-corners each); 90.9 % excluding two grazing-angle
    images.

- id: fuersattel2016-ocpad
  title: "OCPAD — Occluded Checkerboard Pattern Detector"
  authors: ["P. Fürsattel", "S. Dotenco", "S. Placht", "M. Balda", "A. Maier", "C. Riess"]
  year: 2016
  venue: IEEE WACV
  url: https://www5.informatik.uni-erlangen.de/Forschung/Publikationen/2016/Fuersattel16-OCP.pdf
  doi: "10.1109/WACV.2016.7477565"
  pdf: fuersattel2016-ocpad.pdf
  cites: [placht2014-rochade, cordella2004-vf2, bennett2013-chess]
  notes: |
    Plugs behind the graph-construction stage of ROCHADE (after Fig. 1e):
    consumes a candidate graph G_d of checkerboard saddle points and
    edges, emits a matching M : G_d → G_m to the model graph. Pipeline
    (§4): (1) reject candidates with fewer than 50 % of model-graph
    nodes; (2) spatial consistency — minimum inter-node distance equal
    to the ROCHADE subpixel window size, plus a stdev-vs-mean edge-
    length check; (3) quad filter — remove every vertex that is not a
    corner of some 4-cycle (drops triangles and orphan lines); (4) keep
    only the largest connected component; (5) VF2 subgraph isomorphism
    (Cordella 2004) driven by a binary search over N_i vertices ordered
    by BFS distance to an anchor — anchor is the vertex with maximum
    quad-density within BFS depth 3 (§4.1); (6) if binary search
    converges below full N, grow the match vertex-by-vertex in BFS
    order. Algorithm 1 gives the binary-search loop: N_i = round(N_{i-1}
    ± 2^{−i} N) with sign flipping on validMapping success/failure;
    terminates when N_i stops moving.

- id: placht2014-rochade
  title: "ROCHADE: Robust Checkerboard Advanced Detection for Camera Calibration"
  authors: ["S. Placht", "P. Fürsattel", "E. A. Mengue", "H. Hofmann", "C. Schaller", "M. Balda", "E. Angelopoulou"]
  year: 2014
  venue: ECCV
  url: https://www5.informatik.uni-erlangen.de/Forschung/Publikationen/2014/Placht14-RRC.pdf
  doi: "10.1007/978-3-319-10593-2_50"
  pdf: placht2014-rochade.pdf
  cites: [lucchese2003-saddle, chen2005-xcorner, rufli2008-blurred, niblack1992-skeleton]
  notes: |
    Two-stage checkerboard detector that supplies OCPAD with its input
    graph. Stage 1 (§3.1 of the OCPAD paper, summarising Placht 2014):
    Scharr-kernel gradient → magnitude thresholding → centreline thinning
    (Niblack) → saddle-point detection → graph assembly. Stage 2 (§3.2):
    subpixel corner refinement by fitting a polynomial to a lowpass-
    filtered window around each corner, picking the saddle point of the
    polynomial. ROCHADE requires the full pattern to be present;
    OCPAD relaxes that by replacing its matching stage.

- id: cordella2004-vf2
  title: "A (Sub)Graph Isomorphism Algorithm for Matching Large Graphs"
  authors: ["L. P. Cordella", "P. Foggia", "C. Sansone", "M. Vento"]
  year: 2004
  venue: IEEE TPAMI
  url: https://ieeexplore.ieee.org/document/1323804
  doi: "10.1109/TPAMI.2004.75"
  pdf: cordella2004-vf2.pdf
  cites: []
  notes: |
    VF2 subgraph isomorphism algorithm. State-space search with five
    syntactic feasibility rules (self-loops, neighbourhood coherence,
    1-look-ahead, 2-look-ahead, new-in-in/out-out counts) that prune
    infeasible candidate-pair extensions early. Memory O(V) instead of
    VF1's O(V²) via explicit core/terminal sets. Used inside OCPAD as
    the inner exact-match engine under the binary-search driver.

- id: lucchese2003-saddle
  title: "Using saddle points for subpixel feature detection in camera calibration targets"
  authors: ["L. Lucchese", "S. Mitra"]
  year: 2003
  venue: Asia Pacific Conference on Circuits and Systems
  url: https://ieeexplore.ieee.org/document/1115151
  doi: "10.1109/apccas.2002.1115151"
  pdf: lucchese2003-saddle.pdf
  cites: []
  notes: |
    Introduces the saddle-point model for subpixel localization of
    chessboard X-junctions: fit a second-order polynomial in a window
    around an integer corner estimate and solve for the stationary
    point where the gradient vanishes and the Hessian has opposite-sign
    eigenvalues. ROCHADE's stage 2 refinement builds on this template.

- id: chen2005-xcorner
  title: "A New Sub-Pixel Detector for X-Corners in Camera Calibration Targets"
  authors: ["D. Chen", "G. Zhang"]
  year: 2005
  venue: WSCG Short Papers
  url: https://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.87.5833&rep=rep1&type=pdf
  pdf: chen2005-xcorner.pdf
  cites: []
  notes: |
    Alternative subpixel X-corner detector — predates ROCHADE and
    competes with Lucchese's saddle-point fit. ROCHADE §4.2 cites it
    as one of the reference refinement schemes it is benchmarked
    against.

- id: rufli2008-blurred
  title: "Automatic detection of checkerboards on blurred and distorted images"
  authors: ["M. Rufli", "D. Scaramuzza", "R. Siegwart"]
  year: 2008
  venue: IEEE/RSJ IROS
  url: https://rpg.ifi.uzh.ch/docs/IROS08_scaramuzza_b.pdf
  doi: "10.1109/iros.2008.4650703"
  pdf: rufli2008-blurred.pdf
  cites: []
  notes: |
    Addresses the same problem as ROCHADE — detecting checkerboards
    in images that defeat OpenCV's detector because of blur, lens
    distortion, or extreme pose. Pipeline: adaptive thresholding +
    quadrilateral extraction + clique-based grid recovery. ROCHADE
    replaces the quadrilateral extraction with saddle-point detection
    on a thinned gradient centreline and the clique search with a
    graph walk.

- id: niblack1992-skeleton
  title: "Generating skeletons and centerlines from the distance transform"
  authors: ["C. W. Niblack", "P. B. Gibbons", "D. W. Capson"]
  year: 1992
  venue: CVGIP Graphical Models and Image Processing
  url: https://www.sciencedirect.com/science/article/abs/pii/104996529290026T
  doi: "10.1016/1049-9652(92)90026-t"
  pdf: niblack1992-skeleton.pdf
  cites: []
  notes: |
    Two-pass skeletonization that operates on the distance transform
    of a binary mask: classify each pixel as ridge/plateau/slope by
    comparing its distance to its 3×3 neighbours, then thin plateaux
    with a sequential connectivity-preserving pass. ROCHADE uses this
    to reduce thick gradient-magnitude ridges into one-pixel-wide
    centrelines before saddle detection.

- id: abeles2021-pyramidal
  title: "Pyramidal Blur Aware X-Corner Chessboard Detector"
  authors: ["P. Abeles"]
  year: 2021
  venue: arXiv (Cornell University)
  url: https://arxiv.org/pdf/2110.13793
  arxiv: "2110.13793"
  doi: "10.48550/arxiv.2110.13793"
  pdf: abeles2021-pyramidal.pdf
  cites:
  - placht2014-rochade
  - lucchese2003-saddle
  - niblack1992-skeleton
  - harris1988-corner
  - rufli2008-blurred
