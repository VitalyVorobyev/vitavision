<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vv-favicon-dark.svg" />
    <link rel="alternate" type="application/rss+xml" title="VitaVision RSS" href="/rss.xml" />
    <link rel="alternate" type="application/atom+xml" title="VitaVision Atom" href="/atom.xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'sha256-znd4R0XEo2yWSOYP1XBOpBdo7vp8M0E7tB+mHBto5U8=' 'wasm-unsafe-eval' https://*.clerk.accounts.dev https://challenges.cloudflare.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https://img.clerk.com;
      font-src 'self' data:;
      connect-src 'self' blob: https://*.clerk.accounts.dev https://clerk-telemetry.com;
      worker-src 'self' blob:;
      frame-src 'self' https://*.clerk.accounts.dev https://challenges.cloudflare.com;
      object-src 'none';
      base-uri 'self';
    " />
    <title>VitaVision</title>
    <!--
      Anti-flash script: applies the stored theme-variant class to <html>
      synchronously before any CSS or React renders. Runs once, inline, at
      parse time — keeping the FOUC window to zero.
    -->
    <script>
      (function () {
        var VARIANTS = ['aubergine', 'pine', 'oxblood'];
        var DEFAULT  = 'aubergine';
        var stored;
        try { stored = localStorage.getItem('theme-variant'); } catch (_) {}
        var variant = VARIANTS.includes(stored) ? stored : DEFAULT;
        document.documentElement.classList.add('theme-' + variant);

        /* Theme-aware favicon */
        var theme;
        try { theme = localStorage.getItem('theme'); } catch (_) {}
        var isDark = theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var icon = document.querySelector('link[rel="icon"]');
        if (icon) icon.href = isDark ? '/vv-favicon-light.svg' : '/vv-favicon-dark.svg';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
